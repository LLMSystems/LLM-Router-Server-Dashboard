version: "3.9"

services:
    llm-router:
        image: llm-router:latest
        container_name: llm-router-container
        command: tail -f /dev/null
        environment:
            - NVIDIA_VISIBLE_DEVICES=all
        volumes:
            - /etc/localtime:/etc/localtime:ro
            - /home/max:/app
        working_dir: /app
        ports:
            - "8887:8887"
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          capabilities: [gpu]
        restart: unless-stopped
