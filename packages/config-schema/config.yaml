server:
  host: "0.0.0.0"
  port: 8887
  uvicorn_log_level: "info"

LLM_engines:
  # --- Multi-instance group (load-balanced by the router) ---
  Qwen3-0.6B:
    instances:
      - id: "qwen3"
        host: "localhost"
        port: 8002
        cuda_device: 0
      - id: "qwen3-2"
        host: "localhost"
        port: 8004
        cuda_device: 0
      - id: "qwen3-3"
        host: "localhost"
        port: 8014
        cuda_device: 0
      - id: "qwen3-4"
        host: "localhost"
        port: 8015
        cuda_device: 0
    model_config:
      model_tag: "Qwen/Qwen3-0.6B"
      dtype: "float16"
      max_model_len: 500
      gpu_memory_utilization: 0.35
      tensor_parallel_size: 1
      # Cross-instance KV-cache sharing is controlled per-group from the model
      # editor UI (writes a kv_transfer_config OffloadingConnector preset into the
      # overlay), not pinned here — so the toggle can turn it off again.
      # See docs/vllm-kv-cache-cross-instance-design.md.
      # Tool calling: Qwen3 dense uses the Hermes-style tool format. It's a
      # reasoning ("thinking") model, so also split <think> via the qwen3
      # reasoning parser (tool calls are parsed from content, not reasoning).
      enable_auto_tool_choice: true
      tool_call_parser: "hermes"
      reasoning_parser: "qwen3"
      # LoRA test adapter (tiny, untrained) so the dashboard's LoRA picker has
      # something to select in Playground / Eval / Benchmark. Generate it with:
      #   scripts/make_test_lora.sh Qwen/Qwen3-0.6B
      # The served name `qwen3-test-lora` is what you put in the request `model`.
      # Path is the IN-CONTAINER path: docker-compose bind-mounts the host
      # ~/.cache/lora_adapters dir to /lora (override with LORA_ADAPTERS_DIR).
      enable_lora: true
      max_lora_rank: 8
      # max distinct LoRAs per batch (vLLM default 1). The launcher would inject 4
      # when enable_lora is set; pinned here for headroom + visibility.
      max_loras: 4
      # Allow runtime (hot) load/unload from the dashboard — sets
      # VLLM_ALLOW_RUNTIME_LORA_UPDATING. Without it the LoRA set is fixed at launch.
      allow_runtime_lora: true
  # --- Single-instance group ---
  Qwen2.5-0.5B-Instruct:
    instances:
      - id: "q25-05b"
        host: "localhost"
        port: 8006
        cuda_device: 0
    model_config:
      model_tag: "Qwen/Qwen2.5-0.5B-Instruct"
      dtype: "float16"
      max_model_len: 2048
      gpu_memory_utilization: 0.30
      tensor_parallel_size: 1
      # Qwen2.5 tokenizer_config ships Hermes-style tool use — parser `hermes`.
      enable_auto_tool_choice: true
      tool_call_parser: "hermes"

  # --- Multi-instance group ---
  Qwen2.5-1.5B-Instruct:
    instances:
      - id: "q25-15b-a"
        host: "localhost"
        port: 8007
        cuda_device: 0
      - id: "q25-15b-b"
        host: "localhost"
        port: 8008
        cuda_device: 0
    model_config:
      model_tag: "Qwen/Qwen2.5-1.5B-Instruct"
      dtype: "float16"
      max_model_len: 2048
      gpu_memory_utilization: 0.45
      tensor_parallel_size: 1
      # Qwen2.5 tokenizer_config ships Hermes-style tool use — parser `hermes`.
      enable_auto_tool_choice: true
      tool_call_parser: "hermes"

  # --- Single-instance group ---
  Qwen2.5-3B-Instruct:
    instances:
      - id: "q25-3b"
        host: "localhost"
        port: 8009
        cuda_device: 0
    model_config:
      model_tag: "Qwen/Qwen2.5-3B-Instruct"
      dtype: "float16"
      max_model_len: 2048
      gpu_memory_utilization: 0.85
      tensor_parallel_size: 1
      # Qwen2.5 tokenizer_config ships Hermes-style tool use — parser `hermes`.
      enable_auto_tool_choice: true
      tool_call_parser: "hermes"

  # --- Single-instance group ---
  SmolLM2-1.7B-Instruct:
    instances:
      - id: "smollm2"
        host: "localhost"
        port: 8010
        cuda_device: 0
    model_config:
      model_tag: "HuggingFaceTB/SmolLM2-1.7B-Instruct"
      dtype: "float16"
      max_model_len: 2048
      gpu_memory_utilization: 0.50
      tensor_parallel_size: 1
      # No tool calling: SmolLM2 has no matching vLLM tool-call parser. Adding a
      # mismatched parser wouldn't produce tool_calls (see docs/vllm_auto_tool_整理.md).

  # --- Multi-instance group ---
  TinyLlama-1.1B-Chat:
    instances:
      - id: "tinyllama-a"
        host: "localhost"
        port: 8011
        cuda_device: 0
      - id: "tinyllama-b"
        host: "localhost"
        port: 8012
        cuda_device: 0
    model_config:
      model_tag: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
      dtype: "float16"
      max_model_len: 2048
      gpu_memory_utilization: 0.35
      tensor_parallel_size: 1
      # No tool calling: TinyLlama has no matching vLLM tool-call parser.

  # --- Single-instance group ---
  Phi-3.5-mini-instruct:
    instances:
      - id: "phi35-mini"
        host: "localhost"
        port: 8013
        cuda_device: 0
    model_config:
      model_tag: "microsoft/Phi-3.5-mini-instruct"
      dtype: "float16"
      max_model_len: 2048
      gpu_memory_utilization: 0.90
      tensor_parallel_size: 1
      # No tool calling: vLLM has no Phi-3.5 tool parser (phi4_mini_json is Phi-4 only).

  # --- vLLM pooling models (embed / rerank) -------------------------------
  # A pooling model is just a vLLM instance managed exactly like the LLM groups
  # above (start/stop, multi-instance, load-balancing, failover, monitoring).
  # The only extra field is `kind`, which tells the ROUTER which endpoint the
  # group serves (NOT a vLLM flag — the launcher skips it):
  #   kind: embed  -> /v1/embeddings
  #   kind: rerank -> /v1/rerank + /v1/score
  # Native embedding/reranker checkpoints usually need no extra vLLM flags
  # (`--runner auto` detects pooling). For non-native architectures add the
  # pooling flags as ordinary model_config keys (they ride extra="allow"):
  #   runner: pooling
  #   convert: embed            # or: classify (for rerank)
  #   pooler_config: { task: embed }   # -> --pooler-config '{"task":"embed"}'
  # Requests whose `model` isn't an LLM_engines group fall back to the bespoke
  # lightweight embedding_server below, so the two can coexist.
  #
  # Examples (commented out — uncomment + start from the dashboard to use):
  #
  # Distinct group name from the bespoke embedding_server's `m3e-base` key, so
  # both can coexist: model=m3e-base-embed hits this vLLM pooling instance,
  # model=m3e-base falls through to the lightweight server.
  m3e-base-embed:
    instances:
      - id: "m3e-embed-1"
        host: "localhost"
        port: 8020
        cuda_device: 0
    model_config:
      model_tag: "moka-ai/m3e-base"
      kind: embed
      dtype: "float16"
      gpu_memory_utilization: 0.25
      # WSL RAM is the bottleneck (not VRAM): without enforce_eager, vLLM's
      # torch.compile + cudagraph capture exhausts host RAM and the load hangs.
      # Pin max_model_len small. Don't run two vLLM pooling instances at once on
      # a ~10GB WSL box. (bge-m3 also works here but is a 2.27GB download + heavier.)
      enforce_eager: true
      max_model_len: 512

  ms-marco-rerank:
    instances:
      - id: "ms-marco-1"
        host: "localhost"
        port: 8021
        cuda_device: 0
    model_config:
      model_tag: "cross-encoder/ms-marco-MiniLM-L-6-v2"
      kind: rerank
      dtype: "float16"
      gpu_memory_utilization: 0.20

embedding_server:
  host: "localhost"
  port: 8005
  cuda_device: 0

  embedding_models:
    m3e-base:
      model_name: "moka-ai/m3e-base"
      model_path: "./models/embedding_engine/model/embedding_model/m3e-base-model"
      tokenizer_path: "./models/embedding_engine/model/embedding_model/m3e-base-tokenizer"
      max_length: 512
      use_gpu: True
      use_float16: True

  reranking_models:
    ms-marco-minilm:
      model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
      model_path: "./models/embedding_engine/model/reranking_model/ms-marco-minilm-model"
      tokenizer_path: "./models/embedding_engine/model/reranking_model/ms-marco-minilm-tokenizer"
      max_length: 256
      use_gpu: true
      use_float16: True
