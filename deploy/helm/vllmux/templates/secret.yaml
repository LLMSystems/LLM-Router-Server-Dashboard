{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vllmux.secretName" . }}
  labels:
    {{- include "vllmux.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-token: {{ .Values.secrets.adminToken | quote }}
  session-secret: {{ .Values.secrets.sessionSecret | quote }}
  hf-token: {{ .Values.secrets.hfToken | quote }}
  {{- if .Values.postgres.enabled }}
  postgres-password: {{ required "postgres.password is required when postgres.enabled=true (or set secrets.existingSecret)" .Values.postgres.password | quote }}
  {{- end }}
{{- end }}
