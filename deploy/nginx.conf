# Single-origin entry for the dashboard. Serves the SPA and reverse-proxies the
# two backends. The router shares the backend container's network namespace, so
# both `backend:5000` (dashboard API) and `backend:8887` (router) resolve to the
# `backend` compose service.

upstream dashboard_backend { server backend:5000; }
upstream llm_router        { server backend:8887; }

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SSE: the dashboard streams live model state here. Disable buffering so
    # events flush immediately and keep the connection open.
    location /api/stream/ {
        proxy_pass http://dashboard_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
    }

    # Dashboard backend REST API.
    location /api/ {
        proxy_pass http://dashboard_backend;
        proxy_set_header Host $host;
    }
    location = /healthz {
        proxy_pass http://dashboard_backend;
    }

    # LLM router (OpenAI-compatible). proxy_buffering off so streamed chat
    # completions (text/event-stream) reach the client token-by-token.
    location /v1/ {
        proxy_pass http://llm_router;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
    }
    location = /metrics { proxy_pass http://llm_router; }
    location = /reload  { proxy_pass http://llm_router; }

    # SPA fallback (vue-router history mode).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
